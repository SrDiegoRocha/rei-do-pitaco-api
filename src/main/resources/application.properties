spring.application.name=rei-do-pitaco-api

# Dev local: importa .env.local (gitignored) se existir — dispensa configurar env vars no IDE.
# Em producao o arquivo nao existe (optional) e as env vars reais mandam (elas tem precedencia).
spring.config.import=optional:file:.env.local[.properties]

# Render injeta a porta via env var PORT; local cai no 8080
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/reidopitaco}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# Neon free tier tem poucas conexões; mantém o pool pequeno
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Carrega associações lazy em lote (IN (...)) em vez de 1 query por entidade (N+1).
# Essencial com banco remoto (Neon): cada round-trip custa ~15-30ms.
spring.jpa.properties.hibernate.default_batch_fetch_size=100

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Sem default: a aplicação NÃO sobe sem um JWT_SECRET forte (>=32 chars). Ver JwtProperties.
reidopitaco.security.jwt.secret=${JWT_SECRET}
reidopitaco.security.jwt.access-token-expiration-minutes=10080
reidopitaco.security.jwt.refresh-token-expiration-days=7
reidopitaco.security.jwt.issuer=rei-do-pitaco-api

reidopitaco.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8100,http://localhost:3000,https://rei-do-pitaco.pages.dev,https://*.rei-do-pitaco.pages.dev}

# Escudos self-hosted dos times do sistema, servidos em GET /logos/** a partir de logos-dir.
# badge_url relativo no banco é prefixado com base-url na leitura (AssetUrlResolver).
reidopitaco.assets.base-url=${ASSETS_BASE_URL:http://localhost:8080}
reidopitaco.assets.logos-dir=${LOGOS_DIR:./logos}

# Avatares (DiceBear) — seed = nome do usuário. Trocar o estilo aqui muda o avatar de todos.
reidopitaco.avatar.base-url=${AVATAR_BASE_URL:https://api.dicebear.com}
reidopitaco.avatar.version=${AVATAR_VERSION:9.x}
reidopitaco.avatar.style=${AVATAR_STYLE:fun-emoji}

# Actuator: expõe só o health (alvo do ping de keep-alive), sem detalhes sensíveis
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Web Push (VAPID). Sem as chaves preenchidas o envio fica desligado e o app sobe normal.
# A chave privada é SEGREDO — defina via env var, nunca commite.
reidopitaco.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
reidopitaco.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
reidopitaco.push.vapid.subject=${VAPID_SUBJECT:mailto:contato@pitaco.dpdns.org}
# Intervalo da varredura que dispara os avisos de 24h/4h/1h (ms). Padrão: 5 min.
reidopitaco.push.scan-interval-ms=${PUSH_SCAN_INTERVAL_MS:300000}
